<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elapsed Time</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --card-bg: #ff009042;
      --date-pick-text: #ececec;
      --radius: 10px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 1.6rem;
      text-align: center;
    }

    .date-pickers {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    .date-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .date-field label {
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: #cccccc;
    }

    .date-field input[type="number"] {
      width: 100%;
      padding: 0.8rem 0.5rem;
      font-size: 1rem;
      text-align: center;
      background-color: var(--card-bg);
      color: var(--date-pick-text);
      border: none;
      border-radius: var(--radius);
      box-sizing: border-box;
      -moz-appearance: textfield;
    }

    .date-field input[type="number"]::-webkit-inner-spin-button,
    .date-field input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.4;
    }

    .date-field input[type="number"]:focus {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .result {
      margin-top: 1rem;
      padding: 1.2rem;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 1.1rem;
      width: 100%;
      max-width: 400px;
      text-align: left;
      display: inline-block;
      font-family: "Courier New", monospace;
      font-weight: bold;
    }

    .result div {
      white-space: pre;
    }

    #result_years {
      color: #ffffff !important;
    }

    #result_months {
      color: #00ffff !important;
    }

    #result_days {
      color: #66ff00 !important;
    }

    #result_hours {
      color: #ff8800 !important;
    }

    #result_minutes {
      color: #0088ff !important;
    }
  </style>
</head>

<body>
  <h1>Calculate Elapsed Time</h1>

  <div class="date-pickers">
    <div class="date-field">
      <label for="pickYear">Year</label>
      <input type="number" id="pickYear" min="1900" max="2500">
    </div>
    <div class="date-field">
      <label for="pickMonth">Month</label>
      <input type="number" id="pickMonth" min="1" max="12">
    </div>
    <div class="date-field">
      <label for="pickDay">Day</label>
      <input type="number" id="pickDay" min="1" max="31">
    </div>
  </div>

  <div class="result" id="result">
    Pick a date to calculate elapsed time.
  </div>

  <script>
    const pickYear = document.getElementById("pickYear");
    const pickMonth = document.getElementById("pickMonth");
    const pickDay = document.getElementById("pickDay");
    const resultDiv = document.getElementById("result");

    const today = new Date();
    const savedDate = localStorage.getItem("chosenDate");

    if (savedDate) {
      const [y, m, d] = savedDate.split("-").map(Number);
      pickYear.value = y;
      pickMonth.value = m;
      pickDay.value = d;
    } else {
      pickYear.value = today.getFullYear();
      pickMonth.value = today.getMonth() + 1;
      pickDay.value = today.getDate();
    }

    updateResult();

    [pickYear, pickMonth, pickDay].forEach(el => {
      el.addEventListener("change", saveAndUpdate);
      el.addEventListener("input", saveAndUpdate);
    });

    function saveAndUpdate() {
      const y = parseInt(pickYear.value);
      const m = parseInt(pickMonth.value);
      const d = parseInt(pickDay.value);
      if (y && m && d) {
        const pad = (n, len) => String(n).padStart(len, "0");
        localStorage.setItem("chosenDate", `${pad(y, 4)}-${pad(m, 2)}-${pad(d, 2)}`);
      }
      updateResult();
    }

    function updateResult() {
      const y = parseInt(pickYear.value);
      const m = parseInt(pickMonth.value);
      const d = parseInt(pickDay.value);

      if (!y || !m || !d) {
        resultDiv.textContent = "Pick a date to calculate elapsed time.";
        return;
      }

      const chosenDate = new Date(y, m - 1, d);
      if (isNaN(chosenDate) || chosenDate.getMonth() !== m - 1) {
        resultDiv.textContent = "Chosen date is invalid.";
        return;
      }

      const now = new Date();
      if (chosenDate > now) {
        resultDiv.textContent = "Chosen date is in the future.";
        return;
      }

      let years = now.getFullYear() - chosenDate.getFullYear();
      let months = now.getMonth() - chosenDate.getMonth();
      let days = now.getDate() - chosenDate.getDate();
      let hours = now.getHours() - chosenDate.getHours();
      let minutes = now.getMinutes() - chosenDate.getMinutes();

      if (minutes < 0) { minutes += 60; hours--; }
      if (hours < 0) { hours += 24; days--; }
      if (days < 0) {
        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
        days += prevMonth;
        months--;
      }
      if (months < 0) { months += 12; years--; }

      resultDiv.innerHTML = `
        <div id='result_years'>${years.toString().padStart(2, " ")} years</div>
        <div id='result_months'>${months.toString().padStart(2, " ")} months</div>
        <div id='result_days'>${days.toString().padStart(2, " ")} days</div>
        <div id='result_hours'>${hours.toString().padStart(2, " ")} hours</div>
        <div id='result_minutes'>${minutes.toString().padStart(2, " ")} minutes</div>
      `;
    }

    setInterval(updateResult, 60000);
  </script>
</body>

</html>
