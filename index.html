<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elapsed Time</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --card-bg: #ff009042;
      --date-pick-text: #ececec;
      --radius: 10px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 1.6rem;
      text-align: center;
    }

    label {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      display: block;
      text-align: center;
    }

    input[type="date"] {
      padding: 0.8rem 1rem;
      font-size: 1rem;
      background-color: var(--card-bg);
      color: var(--date-pick-text);
      border: none;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 320px;
      box-sizing: border-box;
    }

    input[type="date"]:focus {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) sepia(1) saturate(5) hue-rotate(180deg);
      cursor: pointer;
    }

    .result {
      margin-top: 1rem;
      padding: 1.2rem;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 1.1rem;
      width: 100%;
      max-width: 400px;
      text-align: left;
      display: inline-block;
      font-family: "Courier New", monospace;
      font-weight: bold;
    }

    .result div {
      white-space: pre;
    }

    #result_years {
      color: #ffffff !important;
    }

    #result_months {
      color: #00ffff !important;
    }

    #result_days {
      color: #66ff00 !important;
    }

    #result_hours {
      color: #ff8800 !important;
    }

    #result_minutes {
      color: #0088ff !important;
    }
  </style>
</head>

<body>
  <h1>Calculate Elapsed Time</h1>
  <label for="datePicker">Pick date:</label>
  <input type="date" id="datePicker">

  <div class="result" id="result">
    Pick a date to calculate elapsed time.
  </div>

  <script>
    const datePicker = document.getElementById("datePicker");
    const resultDiv = document.getElementById("result");

    // Încarcă data salvată
    const savedDate = localStorage.getItem("chosenDate");
    if (savedDate) {
      datePicker.value = savedDate;
      updateResult();
    }

    // Salvează data nouă și calculează timpul
    datePicker.addEventListener("change", () => {
      localStorage.setItem("chosenDate", datePicker.value);
      updateResult();
    });

    function updateResult() {
      const chosenDate = new Date(datePicker.value);
      if (isNaN(chosenDate)) {
        resultDiv.textContent = "Chosen date is invalid.";
        return;
      }

      const now = new Date();
      if (chosenDate > now) {
        resultDiv.textContent = "Chosen date is in the future.";
        return;
      }

      let years = now.getFullYear() - chosenDate.getFullYear();
      let months = now.getMonth() - chosenDate.getMonth();
      let days = now.getDate() - chosenDate.getDate();
      let hours = now.getHours() - chosenDate.getHours();
      let minutes = now.getMinutes() - chosenDate.getMinutes();

      // Normalizează diferențele negative
      if (minutes < 0) {
        minutes += 60;
        hours--;
      }
      if (hours < 0) {
        hours += 24;
        days--;
      }
      if (days < 0) {
        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
        days += prevMonth;
        months--;
      }
      if (months < 0) {
        months += 12;
        years--;
      }

      resultDiv.innerHTML = `
        <div id='result_years'>${years.toString().padStart(2, " ")} years</div>
        <div id='result_months'>${months.toString().padStart(2, " ")} months</div>
        <div id='result_days'>${days.toString().padStart(2, " ")} days</div>
        <div id='result_hours'>${hours.toString().padStart(2, " ")} hours</div>
        <div id='result_minutes'>${minutes.toString().padStart(2, " ")} minutes</div>
      `;
    }

    // Actualizează la fiecare minut
    setInterval(updateResult, 60000);
  </script>
</body>

</html>
